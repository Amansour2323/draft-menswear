<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DRAFT — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0ece6;font-family:'Outfit',sans-serif;min-height:100vh}
header{background:#131311;border-bottom:1px solid #2a2822;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
header h1{font-family:'Bebas Neue';font-size:22px;letter-spacing:8px;color:#c8b07a}
.nav{display:flex;gap:4px;background:#131311;padding:10px 24px;border-bottom:1px solid #2a2822;overflow-x:auto}
.nav button{padding:8px 16px;border-radius:8px;background:transparent;border:none;color:#7a7468;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.nav button.active{background:rgba(200,176,122,0.1);color:#c8b07a}
.container{padding:20px;max-width:1400px;margin:0 auto}
.page{display:none}.page.active{display:block}
.toolbar{display:flex;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search{flex:1;min-width:200px;padding:10px 14px;background:#131311;border:1px solid #2a2822;border-radius:8px;color:#f0ece6;font-family:inherit;outline:none;font-size:13px}
.btn{padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn.primary{background:#c8b07a;color:#0a0a0a}
.btn.secondary{background:transparent;border:1px solid #2a2822;color:#b5ae9e}
.btn.danger{background:rgba(224,96,96,0.15);color:#e06060}
.btn.sm{padding:6px 12px;font-size:11px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#131311;border:1px solid #2a2822;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s}
.card:hover{border-color:#c8b07a}
.card .img{width:100%;aspect-ratio:1;background:#1a1917;border-radius:8px;margin-bottom:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px}
.card .img img{width:100%;height:100%;object-fit:cover}
.card .name{font-size:12px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .cat{font-size:10px;color:#7a7468;margin-bottom:6px}
.card .price{font-size:13px;color:#c8b07a;font-weight:700}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;overflow-y:auto}
.modal.open{display:flex}
.modal-box{background:#131311;border:1px solid #2a2822;border-radius:12px;padding:24px;max-width:650px;width:100%;max-height:90vh;overflow-y:auto}
.modal-box h3{color:#c8b07a;margin-bottom:16px;font-size:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:#b5ae9e;margin-bottom:6px;letter-spacing:1px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:#1a1917;border:1px solid #2a2822;border-radius:6px;color:#f0ece6;font-size:13px;font-family:inherit;outline:none}
.form-group input:focus{border-color:#c8b07a}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.img-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.img-item{width:80px;height:80px;border-radius:8px;background:#1a1917;overflow:hidden;position:relative;border:1px solid #2a2822;cursor:pointer}
.img-item img{width:100%;height:100%;object-fit:cover}
.img-item .rm{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(224,96,96,0.9);color:white;border:none;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.img-item .main-tag{position:absolute;bottom:2px;left:2px;padding:2px 6px;border-radius:3px;background:#c8b07a;color:#000;font-size:9px;font-weight:600}
.img-item.uploading{pointer-events:none}
.img-item.uploading::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;border-radius:8px}
.img-item.uploading::before{content:'⏳';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:1;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:0.4}}

.drop{border:2px dashed #2a2822;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s}
.drop:hover,.drop.over{border-color:#c8b07a;background:rgba(200,176,122,0.05)}
.drop p{font-size:12px;color:#7a7468;margin:4px 0}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge.out{background:rgba(224,96,96,0.2);color:#e06060}
.badge.low{background:rgba(232,168,56,0.2);color:#e8a838}
.badge.ok{background:rgba(106,191,105,0.2);color:#6abf69}
.badge.new{background:rgba(106,168,224,0.15);color:#6aa8e0}
.badge.confirmed{background:rgba(106,191,105,0.15);color:#6abf69}
.badge.preparing{background:rgba(232,168,56,0.15);color:#e8a838}
.badge.shipping{background:rgba(200,176,122,0.15);color:#c8b07a}
.badge.delivered{background:rgba(106,191,105,0.25);color:#6abf69}
.badge.canceled{background:rgba(224,96,96,0.15);color:#e06060}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#131311;border:1px solid #2a2822;border-radius:12px;padding:40px;width:400px;max-width:90%}
.login h1{text-align:center;font-family:'Bebas Neue';font-size:32px;letter-spacing:10px;color:#c8b07a;margin-bottom:24px}
.empty{text-align:center;padding:40px;color:#7a7468}

@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}.form-row,.form-row-3{grid-template-columns:1fr}}
</style></head><body>

<div class="login" id="loginPage">
  <div class="login-box">
    <h1>DRAFT</h1>
    <div class="form-group"><label>Email</label><input id="loginEmail" value="admin@draft.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPassword"></div>
    <button class="btn primary" onclick="login()" style="width:100%;padding:12px">LOGIN</button>
    <p id="loginMsg" style="text-align:center;margin-top:12px;font-size:12px;color:#e06060"></p>
  </div>
</div>

<div id="mainApp" style="display:none">
<header>
  <h1>DRAFT — Admin</h1>
  <button class="btn sm secondary" onclick="logout()">Logout</button>
</header>

<div class="nav">
  <button class="active" onclick="showPage('products', event)">📦 Products</button>
  <button onclick="showPage('orders', event)">🛒 Orders</button>
  <button onclick="showPage('categories', event)">🏷️ Categories</button>
  <button onclick="showPage('settings', event)">⚙️ Settings</button>
</div>

<div class="container">

<div class="page active" id="page-products">
  <div class="toolbar">
    <input class="search" id="prodSearch" placeholder="Search products..." oninput="renderProducts()">
    <select class="search" id="prodCat" style="max-width:180px;flex:0" onchange="renderProducts()"></select>
    <button class="btn primary" onclick="openProductModal()">+ New Product</button>
  </div>
  <div class="grid" id="productsGrid"></div>
</div>

<div class="page" id="page-orders">
  <div class="toolbar"><div style="display:flex;gap:6px;flex-wrap:wrap" id="orderTabs"></div></div>
  <div id="ordersList"></div>
</div>

<div class="page" id="page-categories">
  <div id="catsList" style="background:#131311;border:1px solid #2a2822;border-radius:10px;padding:16px"></div>
</div>

<div class="page" id="page-settings">
  <div style="max-width:600px">
    <div style="background:#131311;border:1px solid #2a2822;border-radius:12px;padding:24px;margin-bottom:16px">
      <h3 style="color:#c8b07a;margin-bottom:12px">📘 Facebook Pixel</h3>
      <input id="setFb" placeholder="Pixel ID" style="width:100%;padding:10px;background:#1a1917;border:1px solid #2a2822;border-radius:6px;color:#f0ece6;font-family:inherit">
    </div>
    <div style="background:#131311;border:1px solid #2a2822;border-radius:12px;padding:24px;margin-bottom:16px">
      <h3 style="color:#c8b07a;margin-bottom:12px">🎵 TikTok Pixel</h3>
      <input id="setTt" placeholder="Pixel ID" style="width:100%;padding:10px;background:#1a1917;border:1px solid #2a2822;border-radius:6px;color:#f0ece6;font-family:inherit">
    </div>
    <div style="background:#131311;border:1px solid #2a2822;border-radius:12px;padding:24px;margin-bottom:16px">
      <h3 style="color:#c8b07a;margin-bottom:12px">📊 Google Analytics</h3>
      <input id="setGa" placeholder="G-XXXXXXXXXX" style="width:100%;padding:10px;background:#1a1917;border:1px solid #2a2822;border-radius:6px;color:#f0ece6;font-family:inherit">
    </div>
    <button class="btn primary" onclick="saveSettings()">💾 Save Settings</button>
  </div>
</div>

</div>
</div>

<div class="modal" id="productModal">
  <div class="modal-box">
    <h3 id="prodModalTitle">New Product</h3>
    <div class="form-group"><label>Name *</label><input id="pName"></div>
    <div class="form-row">
      <div class="form-group"><label>Category</label><select id="pCat"></select></div>
      <div class="form-group"><label>SKU</label><input id="pSku"></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Cost</label><input type="number" id="pCost"></div>
      <div class="form-group"><label>Price *</label><input type="number" id="pPrice"></div>
      <div class="form-group"><label>Stock</label><input type="number" id="pStock"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="pDesc" rows="3"></textarea></div>
    <div class="form-group">
      <label>📷 Product Images</label>
      <div class="drop" id="dropZone" onclick="document.getElementById('imgFile').click()">
        <p style="font-size:32px">📷</p>
        <p><strong>Click to upload or drag images here</strong></p>
        <p style="color:#555">JPG, PNG up to 10MB — stored on our server, optimized automatically</p>
      </div>
      <input type="file" id="imgFile" accept="image/*" multiple style="display:none" onchange="handleFiles(event.target.files)">
      <div class="img-list" id="imgList"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn secondary" onclick="closeProductModal()">Cancel</button>
      <button class="btn danger" id="deleteBtn" onclick="deleteProduct()" style="display:none">Delete</button>
      <button class="btn primary" onclick="saveProduct()">Save</button>
    </div>
  </div>
</div>

<script>
const API = 'http://76.13.143.42:8082/api';
const IMAGE_BASE = 'http://76.13.143.42:8080';
let token = localStorage.getItem('draft_admin_token');
let cachedProducts = [], cachedCategories = [], currentImages = [], editingId = null;

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  if (!(opts.body instanceof FormData)) opts.headers['Content-Type'] = 'application/json';
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API Error');
  return data;
}

async function login() {
  try {
    const res = await fetch(API + '/admin/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    token = data.token;
    localStorage.setItem('draft_admin_token', token);
    showApp();
  } catch (e) { document.getElementById('loginMsg').textContent = e.message; }
}

function logout() {
  localStorage.removeItem('draft_admin_token');
  token = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  loadAll();
  loadSettings();
}

function showPage(p, ev) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if (ev) ev.target.classList.add('active');
  if (p === 'products') renderProducts();
  if (p === 'orders') renderOrders();
  if (p === 'categories') renderCategories();
}

async function loadAll() {
  try {
    cachedCategories = await api('/categories');
    cachedProducts = await api('/products');
    renderProducts();
  } catch (e) { alert('Error: ' + e.message); }
}

function imgUrl(url) {
  if (!url) return '';
  if (url.startsWith('http') || url.startsWith('data:')) return url;
  return IMAGE_BASE + url;
}

function renderProducts() {
  const search = document.getElementById('prodSearch').value.toLowerCase();
  const catFilter = document.getElementById('prodCat').value;
  document.getElementById('prodCat').innerHTML = '<option value="">All Categories</option>' + cachedCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  const filtered = cachedProducts.filter(p => (!search || p.name.toLowerCase().includes(search)) && (!catFilter || p.category_id == catFilter));
  document.getElementById('productsGrid').innerHTML = filtered.length ? filtered.map(p => {
    const img = p.images && p.images[0];
    return `<div class="card" onclick="editProduct(${p.id})">
      <div class="img">${img ? `<img src="${imgUrl(img)}">` : '📦'}</div>
      <div class="name">${p.name}</div>
      <div class="cat">${p.category_name || 'Uncategorized'}</div>
      <div class="price">EGP ${(+p.price).toLocaleString()}</div>
      <div style="font-size:10px;margin-top:4px">${p.stock == 0 ? '<span class="badge out">OUT</span>' : p.stock <= 5 ? '<span class="badge low">Low: '+p.stock+'</span>' : '<span class="badge ok">'+p.stock+' in stock</span>'}</div>
    </div>`;
  }).join('') : '<div class="empty" style="grid-column:1/-1">No products. Click "New Product" to add one.</div>';
}

function openProductModal() {
  editingId = null; currentImages = [];
  document.getElementById('prodModalTitle').textContent = 'New Product';
  document.getElementById('deleteBtn').style.display = 'none';
  ['pName','pSku','pDesc','pCost','pPrice','pStock'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pCat').innerHTML = cachedCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  renderImages();
  document.getElementById('productModal').classList.add('open');
}

function editProduct(id) {
  const p = cachedProducts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  currentImages = p.images || [];
  document.getElementById('prodModalTitle').textContent = 'Edit Product';
  document.getElementById('deleteBtn').style.display = 'inline-block';
  document.getElementById('pName').value = p.name;
  document.getElementById('pSku').value = p.sku || '';
  document.getElementById('pDesc').value = p.description || '';
  document.getElementById('pCost').value = p.cost || 0;
  document.getElementById('pPrice').value = p.price || 0;
  document.getElementById('pStock').value = p.stock || 0;
  document.getElementById('pCat').innerHTML = cachedCategories.map(c => `<option value="${c.id}" ${c.id == p.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
  renderImages();
  document.getElementById('productModal').classList.add('open');
}

function closeProductModal() { document.getElementById('productModal').classList.remove('open'); }

// ═══ SERVER-SIDE IMAGE UPLOAD ═══
async function handleFiles(files) {
  if (!files.length) return;
  
  const formData = new FormData();
  for (const file of files) {
    if (file.size > 10 * 1024 * 1024) { alert(file.name + ' too large (max 10MB)'); continue; }
    formData.append('images', file);
    // Add placeholder
    currentImages.push('uploading');
  }
  renderImages();
  
  try {
    const res = await fetch(API + '/admin/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Upload failed');
    }
    
    const data = await res.json();
    
    // Replace placeholders with real URLs
    const uploadCount = data.urls.length;
    const startIdx = currentImages.length - uploadCount;
    for (let i = 0; i < uploadCount; i++) {
      currentImages[startIdx + i] = data.urls[i];
    }
  } catch (e) {
    // Remove failed uploads
    currentImages = currentImages.filter(img => img !== 'uploading');
    alert('Upload failed: ' + e.message);
  }
  renderImages();
}

async function removeImage(i) {
  const url = currentImages[i];
  currentImages.splice(i, 1);
  renderImages();
  // Delete from server if it's a server URL
  if (url && url.startsWith('/uploads/')) {
    try {
      await api('/admin/upload', { method: 'DELETE', body: JSON.stringify({ url }) });
    } catch (e) { console.log('Delete failed:', e); }
  }
}

function setMainImage(i) {
  if (i === 0) return;
  const img = currentImages.splice(i, 1)[0];
  currentImages.unshift(img);
  renderImages();
}

function renderImages() {
  document.getElementById('imgList').innerHTML = currentImages.map((img, i) => {
    if (img === 'uploading') {
      return `<div class="img-item uploading"><div style="width:100%;height:100%;background:#1a1917"></div></div>`;
    }
    return `<div class="img-item"${i !== 0 ? ` onclick="setMainImage(${i})" title="Click to set as main"` : ''}>
      <img src="${imgUrl(img)}">
      ${i === 0 ? '<div class="main-tag">MAIN</div>' : ''}
      <button class="rm" onclick="event.stopPropagation();removeImage(${i})">×</button>
    </div>`;
  }).join('');
}

async function saveProduct() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { alert('Name required'); return; }
  if (currentImages.includes('uploading')) { alert('Wait for images to finish uploading'); return; }
  
  const data = {
    name,
    sku: document.getElementById('pSku').value,
    category_id: +document.getElementById('pCat').value || null,
    description: document.getElementById('pDesc').value,
    cost: +document.getElementById('pCost').value || 0,
    price: +document.getElementById('pPrice').value || 0,
    stock: +document.getElementById('pStock').value || 0,
    images: currentImages,
    variants: []
  };
  try {
    if (editingId) await api('/admin/products/' + editingId, {method:'PUT', body: JSON.stringify(data)});
    else await api('/admin/products', {method:'POST', body: JSON.stringify(data)});
    closeProductModal();
    await loadAll();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteProduct() {
  if (!confirm('Delete this product?')) return;
  try {
    await api('/admin/products/' + editingId, {method:'DELETE'});
    closeProductModal();
    await loadAll();
  } catch (e) { alert('Error: ' + e.message); }
}

let cachedOrders = [], orderFilter = 'all';
async function renderOrders() {
  try {
    cachedOrders = await api('/admin/orders');
    const statuses = ['all','new','confirmed','preparing','shipping','delivered','canceled'];
    document.getElementById('orderTabs').innerHTML = statuses.map(s => {
      const count = s === 'all' ? cachedOrders.length : cachedOrders.filter(o => o.status === s).length;
      return `<button class="btn sm ${orderFilter===s?'primary':'secondary'}" onclick="orderFilter='${s}';renderOrders()">${s} (${count})</button>`;
    }).join('');
    const filtered = orderFilter === 'all' ? cachedOrders : cachedOrders.filter(o => o.status === orderFilter);
    document.getElementById('ordersList').innerHTML = filtered.length ? filtered.map(o => `
      <div style="background:#131311;border:1px solid #2a2822;border-radius:10px;padding:16px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <div><strong style="color:#c8b07a">${o.order_number}</strong> <span class="badge ${o.status}">${o.status}</span></div>
          <div style="font-size:11px;color:#7a7468">${new Date(o.created_at).toLocaleString()}</div>
        </div>
        <div style="font-size:12px;color:#b5ae9e;margin-bottom:8px">${o.customer_name} · ${o.customer_phone} · ${o.shipping_city}</div>
        <div style="font-size:14px;color:#c8b07a;font-weight:600;margin-bottom:10px">EGP ${(+o.total).toLocaleString()}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${o.status === 'new' ? `<button class="btn sm primary" onclick="updateOrderStatus(${o.id},'confirmed')">Confirm</button>` : ''}
          ${o.status === 'confirmed' ? `<button class="btn sm primary" onclick="updateOrderStatus(${o.id},'preparing')">Prepare</button>` : ''}
          ${o.status === 'preparing' ? `<button class="btn sm primary" onclick="updateOrderStatus(${o.id},'shipping')">Ship</button>` : ''}
          ${o.status === 'shipping' ? `<button class="btn sm primary" onclick="updateOrderStatus(${o.id},'delivered')">Delivered</button>` : ''}
          ${o.status !== 'canceled' && o.status !== 'delivered' ? `<button class="btn sm danger" onclick="updateOrderStatus(${o.id},'canceled')">Cancel</button>` : ''}
          ${o.customer_phone ? `<a href="https://wa.me/2${o.customer_phone.replace(/^0/,'')}" target="_blank" style="padding:6px 12px;border-radius:6px;background:#25D366;color:#fff;text-decoration:none;font-size:11px;font-weight:600">💬 WhatsApp</a>` : ''}
        </div>
      </div>
    `).join('') : '<div class="empty">No orders</div>';
  } catch (e) { alert('Error: ' + e.message); }
}

async function updateOrderStatus(id, status) {
  try {
    await api('/admin/orders/' + id + '/status', {method:'PATCH', body: JSON.stringify({status})});
    renderOrders();
  } catch (e) { alert('Error: ' + e.message); }
}

function renderCategories() {
  document.getElementById('catsList').innerHTML = cachedCategories.map(c => {
    const items = cachedProducts.filter(p => p.category_id === c.id);
    const totalStock = items.reduce((a,p) => a + p.stock, 0);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #2a2822">
      <div>
        <div style="font-size:14px;font-weight:500">${c.icon} ${c.name}</div>
        <div style="font-size:11px;color:#7a7468">${items.length} products · Stock: ${totalStock}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadSettings() {
  try {
    const s = await api('/admin/settings');
    document.getElementById('setFb').value = s.fbPixel || '';
    document.getElementById('setTt').value = s.ttPixel || '';
    document.getElementById('setGa').value = s.gaId || '';
  } catch (e) {}
}

async function saveSettings() {
  try {
    await api('/admin/settings', {method:'POST', body: JSON.stringify({
      fbPixel: document.getElementById('setFb').value,
      ttPixel: document.getElementById('setTt').value,
      gaId: document.getElementById('setGa').value
    })});
    alert('✓ Saved!');
  } catch (e) { alert('Error: ' + e.message); }
}

const dz = document.getElementById('dropZone');
if (dz) {
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
  dz.ondragleave = () => dz.classList.remove('over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); };
}

if (token) showApp();
</script></body></html>
